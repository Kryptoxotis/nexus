name: iOS Build (CMP)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'multiplatform/**'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-ios-${{ hashFiles('multiplatform/**/*.gradle*', 'multiplatform/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: gradle-ios-

    - name: Create secrets.properties
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > multiplatform/../secrets.properties
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> multiplatform/../secrets.properties
        echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> multiplatform/../secrets.properties

    - name: Grant execute permission
      run: chmod +x multiplatform/gradlew

    - name: Build iOS Framework
      run: |
        cd multiplatform
        ./gradlew :composeApp:linkDebugFrameworkIosArm64

    - name: Build iOS App
      run: |
        cd multiplatform/iosApp
        xcodebuild build \
          -project iosApp.xcodeproj \
          -scheme iosApp \
          -configuration Debug \
          -destination 'generic/platform=iOS Simulator' \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          | tail -20

    - name: Package .app
      run: |
        cd multiplatform/iosApp
        APP_PATH=$(find build -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/NexusCMP-debug.zip" "$(basename "$APP_PATH")"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-debug
        path: NexusCMP-debug.zip
        if-no-files-found: warn

    - name: Clean secrets
      if: always()
      run: rm -f secrets.properties
