name: iOS Build (CMP)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'multiplatform/**'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-ios-${{ hashFiles('multiplatform/**/*.gradle*', 'multiplatform/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: gradle-ios-

    - name: Create secrets.properties
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > secrets.properties
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> secrets.properties
        echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> secrets.properties

    - name: Grant execute permission
      run: chmod +x multiplatform/gradlew

    - name: Clean Gradle build cache
      run: cd multiplatform && ./gradlew clean --no-daemon

    - name: Build iOS App (Device)
      run: |
        cd multiplatform/iosApp
        xcodebuild build \
          -project iosApp.xcodeproj \
          -scheme iosApp \
          -configuration Debug \
          -destination 'generic/platform=iOS' \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="-" \
          2>&1 | tee xcodebuild.log | tail -50

        if grep -q "BUILD FAILED" xcodebuild.log; then
          echo "=== BUILD ERRORS ==="
          grep "error:" xcodebuild.log | head -20
          exit 1
        fi

    - name: Verify and create unsigned IPA
      run: |
        cd multiplatform/iosApp
        APP_PATH=$(find build -name "*.app" -type d -path "*/Debug-iphoneos/*" | head -1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find build -name "*.app" -type d | head -1)
        fi

        if [ -z "$APP_PATH" ]; then
          echo "ERROR: No .app found"
          exit 1
        fi

        echo "Found app at: $APP_PATH"
        ls -la "$APP_PATH/"

        APP_NAME=$(basename "$APP_PATH" .app)
        if [ ! -f "$APP_PATH/$APP_NAME" ]; then
          echo "ERROR: No executable in .app bundle"
          find "$APP_PATH" -type f
          exit 1
        fi

        echo "Executable: $APP_PATH/$APP_NAME"
        file "$APP_PATH/$APP_NAME"

        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r "$GITHUB_WORKSPACE/NexusCMP-unsigned.ipa" Payload
        rm -rf Payload
        echo "IPA size: $(du -h "$GITHUB_WORKSPACE/NexusCMP-unsigned.ipa" | cut -f1)"

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-unsigned-ipa
        path: NexusCMP-unsigned.ipa
        if-no-files-found: error

    - name: Clean secrets
      if: always()
      run: rm -f secrets.properties
